<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billionaires Store</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0c0c0c;
    color: #fff;
}

.header {
    position: fixed;
    width: 100%;
    background: #000;
    padding: 10px;
}

.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}

.logo img {
    height: 45px;
}

.products {
    margin-top: 100px;
    padding: 20px;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.product-card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product-price {
    color: gold;
}

.add-cart-btn {
    background: gold;
    border: none;
    padding: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<header class="header">
<div class="nav-container">
<div class="logo">
<img src="logo.png">
</div>
<button>Cart (<span id="cartCount">0</span>)</button>
</div>
</header>

<section class="products">
<h2>Products</h2>
<div class="products-grid" id="productsGrid"></div>
</section>

<script>
const luxuryProducts = [
{ id:1,name:"Vertu Phone",price:125000,image:"📱"},
{ id:2,name:"Luxury Speaker",price:105000,image:"🔊"},
{ id:3,name:"Smart Watch",price:25000,image:"⌚"},
{ id:4,name:"Premium Audio",price:85000,image:"🎵"},
{ id:5,name:"iPhone Luxury",price:98000,image:"📱"},
{ id:6,name:"Vision Pro",price:45000,image:"👓"},
{ id:7,name:"Rolex Smart",price:35000,image:"⌚"},
{ id:8,name:"Amplifier",price:125000,image:"🔊"},
{ id:9,name:"AirPods Pro 2",price:2499,image:"🎧"}
];

let cart = [];

function renderProducts() {
const grid = document.getElementById("productsGrid");

grid.innerHTML = luxuryProducts.map(p => `
<div class="product-card">
<div style="font-size:40px">${p.image}</div>
<h3>${p.name}</h3>
<div class="product-price">₹${p.price}</div>
<button class="add-cart-btn" onclick="addToCart(${p.id})">Add</button>
</div>
`).join("");
}

function addToCart(id){
cart.push(id);
document.getElementById("cartCount").innerText = cart.length;
}

renderProducts();
</script>

</body>
</html>
