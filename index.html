<!DOCTYPE html>
<html>
<head>
  <title>Billionaires Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f1f3f6;
    }

    header {
      background: #2874f0;
      color: white;
      padding: 15px;
      font-size: 20px;
      display: flex;
      justify-content: space-between;
    }

    .search {
      width: 40%;
      padding: 5px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    button {
      background: #fb641b;
      color: white;
      border: none;
      padding: 8px;
      margin-top: 5px;
      cursor: pointer;
    }

    .cart {
      position: fixed;
      right: 0;
      top: 70px;
      width: 250px;
      background: white;
      padding: 15px;
      height: 100%;
      box-shadow: -2px 0 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<header>
  <div>Billionaires Store 🛒</div>
  <input class="search" placeholder="Search products...">
</header>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <a href="product1.html">
  <h3>T-Shirt</h3>
</a>
    <p>₹499</p>
    <button onclick="addToCart('T-Shirt',499)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Shoes</h3>
    <p>₹999</p>
    <button onclick="addToCart('Shoes',999)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Watch</h3>
    <p>₹799</p>
    <button onclick="addToCart('Watch',799)">Add to Cart</button>
  </div>

</div>

<div class="cart">
  <h3>Cart 🛒</h3>
  <ul id="cartItems"></ul>
  <h4>Total: ₹<span id="total">0</span></h4>
  <button onclick="order()">Order</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
  cart.push(name + " ₹" + price);
  total += price;

  let li = document.createElement("li");
  li.innerText = name + " ₹" + price;
  document.getElementById("cartItems").appendChild(li);

  document.getElementById("total").innerText = total;
}

function order(){
  let msg = "Order:%0A";
  cart.forEach(i => msg += i + "%0A");
  msg += "Total: ₹" + total;

  window.open("https://wa.me/91XXXXXXXXXX?text=" + msg);
}
</script>

</body>
</html>
